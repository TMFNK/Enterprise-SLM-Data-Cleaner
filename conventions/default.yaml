# =============================================================================
# default.yaml: the house convention as data.
#
# This file defines WHAT the cleaner normalizes to: controlled vocabularies,
# alias maps (messy variant -> canonical value), missing-value encodings, and
# which field carries which field type. The HOW (parsing dates, amounts,
# phone numbers...) lives in core/convention_spec.py, keyed by field type.
#
# Per-client customization: copy this file (e.g. conventions/acme.yaml), edit
# the vocabularies and aliases to the client's house standard, and point the
# pipeline at it:
#
#     make data CONVENTION=conventions/acme.yaml
#
# No code changes needed. All values below are invented; no client data.
# =============================================================================

