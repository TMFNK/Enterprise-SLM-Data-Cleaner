# Missing/unknown is encoded ONE way everywhere: JSON null. Never a sentinel.
empty_strings: ["", " ", "-", "--", "n/a", "N/A", "na", "null", "NULL", "none", "?"]
numeric_sentinels: [-1, -999, 9999]

# Semantic alias resolution via bge-m3 embeddings (optional, off by default).
# Applied only after the deterministic alias map misses. Embeddings are compared
# against canonical codes AND every alias key (readable anchors) — bare ISO
# codes alone are not semantic enough. Regions / true unknowns below threshold
# pass through unchanged (grounding). Tuned so Bavaria/Atlantis/GmbbH stay put
# while near-misses like "Nederlands" still resolve.
# Set USE_EMBEDDINGS=1 to activate; the model downloads on first resolve().
embedding_thresholds:
  country: 0.75
  legalForm: 0.70
  currency: 0.90
  unit: 0.85
  status: 0.85

# field name -> field type (the type picks the normalizer in convention_spec.py)
fields:
  recordId: "id"
  recordType: "recordType"
  name1: "text"
  name2: "text"
  legalForm: "legalForm"
  street: "text"
  houseNo: "text"
  postalCode: "text"
  city: "text"
  country: "country"
  region: "text"
  vatId: "vat"
  taxNumber: "text"
  iban: "iban"
  bic: "id"
  email: "email"
  phone: "phone"
  currency: "currency"
  baseUnit: "unit"
  status: "status"
  validFrom: "date"
  validTo: "date"
  amount: "amount"
