  "mbh": "GmbH"
  "gmbh.": "GmbH"
  "gmbh (gesellschaft mit beschränkter haftung)": "GmbH"
  "gesellschaft mit beschränkter haftung (gmbh)": "GmbH"
  "aktiengesellschaft": "AG"
  "ag.": "AG"
  "aktiengesellschaft (ag)": "AG"
  "unternehmergesellschaft": "UG"
